name: Supabase Keep-Alive

# Gira da solo ogni 2 giorni (margine ampio sotto i 7 giorni di Supabase)
# e puoi avviarlo a mano dal pulsante "Run workflow".
on:
  schedule:
    - cron: '0 6 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Scrittura reale sul database (tiene sveglio Supabase)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://zwuutlrafdmfqexbnohc.supabase.co/rest/v1/keepalive" \
            -H "apikey: sb_publishable_6oCmDuDh_8ibf-p4ZAcfZg_muXXuO8N" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"ts\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "Risposta del database: HTTP $CODE"
          case "$CODE" in
            2*) echo "OK: ping registrato, timer di pausa azzerato." ;;
            *) echo "ERRORE HTTP $CODE"; exit 1 ;;
          esac

      - name: Marcatore anti-disattivazione (tiene vivo GitHub Actions)
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .github/last-keepalive.txt

      - name: Salva il marcatore
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-keepalive.txt
          git commit -m "keep-alive: $(date -u +%F)" || exit 0
          git push
