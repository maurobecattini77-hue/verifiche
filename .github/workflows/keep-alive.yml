name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 */2 * *'      # ogni 2 giorni alle 06:00 UTC (margine ampio sui 7 giorni)
  workflow_dispatch:            # permette di lanciarlo a mano col pulsante "Run workflow"

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Scrivi un battito su Supabase (attività vera sul database)
        env:
          SUPABASE_URL: "https://zwuutlrafdmfqexbnohc.supabase.co"
          SUPABASE_KEY: "sb_publishable_6oCmDuDh_8ibf-p4ZAcfZg_muXXuO8N"
        run: |
          set -e
          echo "Invio del battito alla tabella keepalive..."
          codice=$(curl -s -o risposta.txt -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/keepalive" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}')
          echo "Codice di risposta HTTP: $codice"
          echo "Risposta di Supabase:"
          cat risposta.txt
          echo ""
          if [ "$codice" -lt 200 ] || [ "$codice" -ge 300 ]; then
            echo "ERRORE: Supabase non ha accettato il battito (codice $codice)."
            exit 1
          fi
          echo "Battito registrato correttamente."

      - name: Lascia una traccia su GitHub (per non far addormentare il repository)
        run: |
          date -u > .keepalive
          git config user.name "keepalive-bot"
          git config user.email "keepalive@users.noreply.github.com"
          git add .keepalive
          git commit -m "keep-alive ping" || echo "niente da aggiornare"
          git push
