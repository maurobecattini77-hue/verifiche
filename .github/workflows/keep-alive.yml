name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 6 * * 1,3,5'   # lunedì, mercoledì e venerdì alle 06:00 UTC
  workflow_dispatch:           # permette di lanciarlo a mano col pulsante "Run workflow"

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Sveglia Supabase
        run: |
          curl -s "https://zwuutlrafdmfqexbnohc.supabase.co/rest/v1/app_state?select=id&limit=1" \
            -H "apikey: sb_publishable_6oCmDuDh_8ibf-p4ZAcfZg_muXXuO8N" \
            -H "Authorization: Bearer sb_publishable_6oCmDuDh_8ibf-p4ZAcfZg_muXXuO8N"

      - name: Lascia una traccia (per non far addormentare GitHub)
        run: |
          date -u > .keepalive
          git config user.name "keepalive-bot"
          git config user.email "keepalive@users.noreply.github.com"
          git add .keepalive
          git commit -m "keep-alive ping" || echo "niente da aggiornare"
          git push
