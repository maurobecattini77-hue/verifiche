            const setComment = (qid, c) => setGrades(p => ({ ...p, [qid]: { ...p[qid], comment: c } }));
            const totalOpen = opens.reduce((t, q) => t + (grades[q.id] ? grades[q.id].score : 0), 0);
            const maxOpenAll = opens.reduce((t, q) => t + q.points, 0);

            // anteprima live di totale, percentuale e voto, considerando i punteggi che sto digitando ora
            const liveStudent = { ...student, openGrades: grades };
            const bd = computeBreakdown(liveStudent, questions);
            const pct = bd.totalMax ? Math.round(bd.percent) : 0;
            const passed = bd.percent >= SOGLIA_SUFFICIENZA;

            return (
                <div>
                    <div className="flex items-center justify-between mb-1">
                        <h3 className="text-xl font-extrabold text-[#34495e]">Correzione domande aperte</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-[#34495e]"><Icon name="x" size={22}/></button>
                    </div>
                    <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">{student.lastName} {student.firstName}</div>

                    <div className="bg-[#34495e] text-white rounded-2xl px-5 py-3 mb-4 flex items-center justify-between flex-wrap gap-3">
                        <div className="flex items-center gap-4 text-sm font-semibold">
                            <span className="text-white/70">Chiuse <b className="text-white">{fmtN(bd.closedScore)}</b>/{fmtN(bd.closedMax)}</span>
                            <span className="text-white/70">Aperte <b className="text-white">{fmtN(totalOpen)}</b>/{fmtN(maxOpenAll)}</span>
                            <span className="text-white/70">Totale <b className="text-white">{fmtN(bd.total)}</b>/{fmtN(bd.totalMax)}</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-right"><div className="text-[11px] uppercase tracking-widest text-white/60">Percentuale</div><div className={`text-2xl font-extrabold ${passed ? 'text-[#a8e0b3]' : 'text-[#f3a39a]'}`}>{pct}%</div></div>
                            <div className="text-right border-l border-white/20 pl-3"><div className="text-[11px] uppercase tracking-widest text-white/60">Voto</div><div className={`text-2xl font-extrabold ${passed ? 'text-[#a8e0b3]' : 'text-[#f3a39a]'}`}>{votoFromPercent(bd.percent)}</div></div>
                        </div>
                    </div>

                    <div className="space-y-6 max-h-[52vh] overflow-y-auto pr-1">
                        {opens.map((q, i) => {
                            const a = student.answers && student.answers[q.id];
                            const txt = (a && typeof a.selection === 'string') ? a.selection : '';
                            return (
                                <div key={q.id} className="border-b border-gray-100 pb-6 last:border-0">
                                    <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Aperta {i+1} · max {fmtN(q.points)} pt</div>
                                    <p className="font-bold text-[#2e2e2e] mb-2 leading-relaxed text-sm">{q.question}</p>
                                    <div className="text-xs font-bold text-[#34495e] uppercase mb-1">Risposta dell'alunno</div>
                                    <div className="bg-gray-50 rounded-xl p-3 text-sm whitespace-pre-wrap leading-relaxed mb-3 max-h-48 overflow-y-auto border">{txt || <span className="italic text-gray-400">Nessun testo presente.</span>}</div>
                                    <div className="flex items-center gap-2 mb-2">
                                        <label className="text-sm font-bold text-[#34495e]">Punteggio</label>
                                        <input type="number" min="0" max={q.points} step="0.1" value={grades[q.id] ? grades[q.id].score : 0}
                                            onChange={(e) => setScore(q.id, q.points, e.target.value)}
                                            className="w-24 p-2 rounded-lg border-2 border-gray-200 focus:border-[#34495e] outline-none text-center font-bold"/>
                                        <span className="text-sm text-[#756f63]">/ {fmtN(q.points)} punti</span>
                                    </div>
                                    <div className="text-xs font-bold text-[#34495e] uppercase mb-1">Commento del docente</div>
                                    <textarea value={grades[q.id] ? grades[q.id].comment : ''} onChange={(e) => setComment(q.id, e.target.value)} rows={6}
                                        placeholder="Scrivi qui un commento articolato per lo studente e la famiglia (puoi anche incollare un testo lungo)…"
                                        className="w-full p-3 rounded-xl border-2 border-gray-200 focus:border-[#34495e] outline-none text-sm leading-relaxed resize-y overflow-y-auto min-h-[7rem]"/>
                                </div>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-2 gap-3 mt-5">
                        <button onClick={onClose} className="py-3 rounded-xl font-bold border-2 border-[#34495e] text-[#34495e] hover:bg-gray-50">Annulla</button>
                        <button onClick={() => onSave(student.pin, grades)} className="py-3 rounded-xl font-bold bg-[#34495e] text-white hover:bg-[#2c3e50]">Registra voti</button>
                    </div>
                </div>
            );
        };

        const PrintArea = ({ cls, classData, questions, maxClosed, maxOpen, maxTotal }) => {
            const students = Object.values(classData.students)
                .filter(s => s.status === 'submitted' || s.status === 'published')
                .sort((a,b) => (a.lastName+a.firstName).localeCompare(b.lastName+b.firstName));

            const describeAnswer = (q, s) => {
                const a = s.answers ? s.answers[q.id] : null;
                const sel = a ? a.selection : null;
                if (q.type === 'single') {
                    return <div style={{ marginLeft: 12 }}>
                        <div>Scelta: {sel != null ? q.options[sel] : <i>Non risposta</i>}</div>
                        {sel !== q.correctIndex && <div style={{ color: '#34495e' }}>Corretta: {q.options[q.correctIndex]}</div>}
                    </div>;
                }
                if (q.type === 'multi') {
                    const arr = Array.isArray(sel) ? sel : [];
                    return <div style={{ marginLeft: 12 }}>
                        <div>Selezionate: {arr.length ? arr.map(i => q.options[i]).join(' · ') : <i>Nessuna</i>}</div>
                        <div style={{ color: '#34495e' }}>Corrette: {(q.correctIndices||[]).map(i => q.options[i]).join(' · ')}</div>
                    </div>;
                }
                if (q.type === 'matching') {
                    return <div style={{ marginLeft: 12 }}>
                        {(q.pairs||[]).map((p, k) => {
                            const ch = sel && sel[p.item];
                            const ok = ch === p.match;
                            return <div key={k} style={{ color: ok ? '#4c7a55' : '#c0392b' }}>{p.item} → {ch || '—'} {ok ? '✓' : '✗'}{!ok && <span style={{ color: '#34495e' }}> (corretto: {p.match})</span>}</div>;
                        })}
                    </div>;
                }
                if (q.type === 'open') {
                    const g = s.openGrades && s.openGrades[q.id];
                    const txt = (a && typeof a.selection === 'string') ? a.selection : '';
                    return <div style={{ marginLeft: 12, whiteSpace: 'pre-wrap' }}>
                        <div>Risposta: {txt || <i>Testo vuoto</i>}</div>
                        {g && g.comment && <div style={{ marginTop: 4, fontStyle: 'italic', color: '#34495e' }}>Nota docente: {g.comment}</div>}
                    </div>;
                }
                return null;
            };

            const content = (
                <div style={{ fontFamily: 'Cabin, sans-serif', color: '#2e2e2e' }}>
                    {students.length === 0 && <div style={{ padding: 20 }}>Nessuna prova consegnata disponibile per la stampa.</div>}
                    {students.map(s => {
                        const bd = computeBreakdown(s, questions);
                        const percent = bd.totalMax ? Math.round(bd.percent) : 0;
                        const ordered = orderedQuestions(s, questions);
                        const hasClosed = bd.closedMax > 0, hasOpen = bd.openMax > 0;
                        return (
                            <div key={s.pin} className="print-student" style={{ padding: '4mm 0' }}>
                                <div style={{ borderBottom: '3px solid #34495e', paddingBottom: 8, marginBottom: 14 }}>
                                    <div style={{ fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', color: '#756f63' }}>Report Esito Verifiche Live Cloud</div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginTop: 4 }}>
                                        <div style={{ fontSize: 22, fontWeight: 800, color: '#34495e' }}>{s.lastName} {s.firstName}</div>
                                        <div style={{ fontWeight: 700 }}>Classe {cls} · PIN {s.pin}</div>
                                    </div>
                                    <div style={{ marginTop: 6, fontWeight: 700 }}>
                                        Punteggio: {fmtN(bd.total)}/{fmtN(bd.totalMax)} ({percent}%)
                                        {hasClosed && <span> — Chiuse {fmtN(bd.closedScore)}/{fmtN(bd.closedMax)}</span>}
                                        {hasOpen && <span>, Aperte {fmtN(bd.openScore)}/{fmtN(bd.openMax)}</span>}
                                        {' '}— Voto {votoFromPercent(bd.percent)}
                                    </div>
                                </div>

                                {ordered.map((q, i) => {
                                    const pts = pointsForQuestion(q, s);
                                    return (
                                        <div key={q.id} className="print-q" style={{ marginBottom: 10, fontSize: 12 }}>
                                            <div style={{ fontWeight: 700 }}>{i+1}. {q.question} <span style={{ fontWeight: 800, color: '#34495e' }}>[{fmtN(pts)}/{fmtN(q.points)}]</span></div>
                                            {describeAnswer(q, s)}
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>
            );
            return ReactDOM.createPortal(content, document.getElementById('print-area'));
        };

        const buildArchiveHTML = (cls, classData, questions, maxClosed, maxOpen, maxTotal) => {
            // Solo gli alunni che hanno effettivamente svolto la prova (gli assenti restano fuori)
            const studentsDone = {};
            Object.values(classData.students).forEach(s => {
                if (s.status === 'submitted' || s.status === 'published') studentsDone[String(s.pin)] = s;
            });
            const payload = { cls, generatedAt: new Date().toISOString(), SOGLIA: SOGLIA_SUFFICIENZA, maxClosed, maxOpen, maxTotal, questions, students: studentsDone };
            const dataJson = JSON.stringify(payload).replace(/</g, '\\u003c');

            const archScript = `
                const { useState } = React;
                const D = window.__ARCHIVE__;
                const Q = D.questions;
                const SOGLIA = D.SOGLIA;
                const fmtN = function(n){ return parseFloat(Number(n||0).toFixed(2)).toString().replace('.', ','); };
                const votoFromPercent = function(percent){
                    var p = Math.round(percent);
                    if (p <= 30) return "3";
                    var t = [[41,"4"],[43,"4+"],[46,"4,5"],[48,"5-"],[51,"5"],[53,"5+"],[56,"5,5"],[58,"6-"],[61,"6"],[63,"6+"],[66,"6,5"],[68,"7-"],[71,"7"],[73,"7+"],[76,"7,5"],[78,"8-"],[81,"8"],[83,"8+"],[86,"8,5"],[88,"9-"],[91,"9"],[93,"9+"],[96,"9,5"],[98,"10-"],[100,"10"]];
                    for (var k=0;k<t.length;k++){ if (p<=t[k][0]) return t[k][1]; }
                    return "10";
                };
                const pointsFor = function(q, s){
                    if(q.type==='open'){ var g=s.openGrades&&s.openGrades[q.id]; return (g&&g.score!=null)?g.score:0; }
                    var a=s.answers&&s.answers[q.id]; if(!a||a.selection==null) return 0; var sel=a.selection;
                    if(q.type==='single') return sel===q.correctIndex?q.points:0;
                    if(q.type==='multi'){ if(!Array.isArray(sel)) return 0; var c=sel.filter(function(i){return (q.correctIndices||[]).indexOf(i)>=0;}).length; var w=sel.length-c; if(w===0&&c===2) return q.points; if(w===0&&c===1) return 0.5; return 0; }
                    if(q.type==='matching'){ var pairs=q.pairs||[]; var tot=pairs.length||4; var ok=0; pairs.forEach(function(p){ if(sel&&sel[p.item]===p.match) ok++; }); if(ok===tot) return q.points; if(ok>=2) return 0.5; return 0; }
                    return 0;
                };
                const breakdown = function(s){
                    var cs=0,cm=0,os=0,om=0;
                    Q.forEach(function(q){ var p=pointsFor(q,s); if(q.type==='open'){os+=p;om+=q.points;} else {cs+=p;cm+=q.points;} });
                    var total=cs+os, totalMax=cm+om;
                    return {closedScore:cs,closedMax:cm,openScore:os,openMax:om,total:total,totalMax:totalMax,percent: totalMax?(total/totalMax*100):0};
                };
                const ordered = function(s){
                    var ord=s.questionOrder; if(Array.isArray(ord)&&ord.length){ var byId={}; Q.forEach(function(q){byId[q.id]=q;}); var list=ord.map(function(id){return byId[id];}).filter(Boolean); Q.forEach(function(q){ if(ord.indexOf(q.id)<0) list.push(q); }); return list; } return Q;
                };
                const students = Object.keys(D.students).map(function(k){ return D.students[k]; }).sort(function(a,b){ return (a.lastName+a.firstName).localeCompare(b.lastName+b.firstName); });

                function QView(props){
                    var q=props.q, s=props.s;
                    var a=s.answers&&s.answers[q.id];
                    var sel=a?a.selection:null;
                    if(q.type==='single' || q.type==='multi'){
                        var picks = q.type==='multi' ? (Array.isArray(sel)?sel:[]) : (sel!=null?[sel]:[]);
                        var corr = q.type==='multi' ? (q.correctIndices||[]) : [q.correctIndex];
                        return (
                            <div className="space-y-2">
                                {q.options.map(function(opt,idx){
                                    var isSel=picks.indexOf(idx)>=0; var isCor=corr.indexOf(idx)>=0;
                                    var stl="bg-gray-50 text-gray-400 border-transparent";
                                    if(isCor) stl="bg-[#7fb088] text-white border-[#7fb088]";
                                    else if(isSel) stl="bg-[#c0392b] text-white border-[#c0392b]";
                                    return <div key={idx} className={"p-3 rounded-xl text-sm font-medium border flex items-center justify-between "+stl}><span>{opt}</span><span className="text-xs font-extrabold">{isCor?"\u2713":(isSel?"\u2717":"")}</span></div>;
                                })}
                            </div>
                        );
                    }
                    if(q.type==='matching'){
                        return (
                            <div className="space-y-2">
                                {(q.pairs||[]).map(function(p,k){
                                    var ch=sel&&sel[p.item]; var ok=ch===p.match;
                                    return <div key={k} className={"p-3 rounded-xl border text-sm "+(ch?(ok?"border-[#7fb088] bg-[#7fb088]/5":"border-[#c0392b] bg-[#c0392b]/5"):"border-gray-300")}><div className="font-semibold text-[#2e2e2e]">{p.item}</div><div className={ok?"text-[#4c7a55]":"text-[#c0392b]"}>{ch||"\u2014"} {ch?(ok?"\u2713":"\u2717"):""}</div>{!ok?<div className="text-[#34495e] text-xs mt-1">Corretto: {p.match}</div>:null}</div>;
                                })}
                            </div>
                        );
                    }
                    var txt=(a&&typeof a.selection==='string')?a.selection:'';
                    var g=s.openGrades&&s.openGrades[q.id];
                    return (
                        <div>
                            <div className="bg-gray-50 rounded-xl p-4 text-sm whitespace-pre-wrap leading-relaxed text-[#2e2e2e]">{txt||"\u2014"}</div>
                            {g&&g.comment?<div className="bg-[#aed6f1]/20 rounded-xl p-4 text-sm mt-3"><div className="text-xs font-bold text-[#34495e] uppercase mb-1">Commento del docente</div><div className="text-[#2e2e2e] leading-relaxed whitespace-pre-wrap">{g.comment}</div></div>:null}
                        </div>
                    );
                }

                function Dettaglio(props){
                    var s=props.student; var bd=breakdown(s);
                    var pct=bd.totalMax?Math.round(bd.percent):0; var voto=votoFromPercent(bd.percent); var passed=pct>=SOGLIA;
                    var list=ordered(s); var hasClosed=bd.closedMax>0, hasOpen=bd.openMax>0;
                    return (
                        <div className="max-w-2xl mx-auto px-4 py-6">
                            <button onClick={props.back} className="mb-4 text-sm font-bold text-[#34495e] flex items-center gap-1">&larr; Torna all'elenco</button>
                            <div className="bg-white rounded-3xl shadow-md border border-gray-100 p-7 mb-5">
                                <div className="flex justify-between items-start">
                                    <div><div className="text-xs font-bold text-gray-400 uppercase tracking-widest">Classe {D.cls} · PIN {s.pin}</div><h2 className="text-2xl font-extrabold text-[#34495e]">{s.lastName} {s.firstName}</h2></div>
                                    <div className="text-right"><div className={"text-4xl font-extrabold "+(passed?"text-[#7fb088]":"text-[#c0392b]")}>{voto}</div><div className="text-xs font-semibold text-[#756f63] mt-1">{fmtN(bd.total)}/{fmtN(bd.totalMax)} · {pct}%</div></div>
                                </div>
                                <div className="flex flex-wrap gap-2 mt-3 text-xs font-semibold">
                                    {hasClosed?<span className="bg-gray-100 rounded-lg px-3 py-1.5 text-[#34495e]">Chiuse {fmtN(bd.closedScore)}/{fmtN(bd.closedMax)}</span>:null}
                                    {hasOpen?<span className="bg-[#d2b4de]/25 rounded-lg px-3 py-1.5 text-[#5b4a6b]">Aperte {fmtN(bd.openScore)}/{fmtN(bd.openMax)}</span>:null}
                                    <span className="bg-[#34495e] text-white rounded-lg px-3 py-1.5">Totale {fmtN(bd.total)}/{fmtN(bd.totalMax)}</span>
                                </div>
                            </div>
                            {list.map(function(q,i){
                                var pts=pointsFor(q,s); var isOpen=q.type==='open'; var ans=s.answers&&s.answers[q.id];
                                var answered = isOpen ? (ans&&typeof ans.selection==='string'&&ans.selection.trim().length>0) : (ans&&ans.selection!=null);
                                var border, badge, btxt;
                                if(isOpen){ border="border-[#d2b4de]"; badge="bg-[#d2b4de]/25 text-[#5b4a6b]"; btxt=fmtN(pts)+"/"+fmtN(q.points)+" pt"; }
                                else if(!answered){ border="border-gray-300"; badge="bg-gray-200 text-gray-600"; btxt="NON RISPOSTA"; }
                                else if(Math.abs(pts-q.points)<0.01){ border="border-[#7fb088]"; badge="bg-[#7fb088]/10 text-[#7fb088]"; btxt="CORRETTA"; }
                                else if(pts>0){ border="border-[#f7dd73]"; badge="bg-[#f7dd73]/20 text-[#756f63]"; btxt="PARZIALE"; }
                                else { border="border-[#c0392b]"; badge="bg-[#c0392b]/10 text-[#c0392b]"; btxt="ERRATA"; }
                                return (
                                    <div key={q.id} className={"bg-white p-5 rounded-2xl shadow-sm border-l-8 mb-4 "+border}>
                                        <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Domanda {i+1}</span><span className={"text-xs font-bold px-2 py-1 rounded "+badge}>{btxt}</span></div>
                                        <p className="font-bold text-[#2e2e2e] mb-3 leading-relaxed">{q.question}</p>
                                        <QView q={q} s={s} />
                                        {(!isOpen&&q.explanation)?<div className="mt-4 pt-3 border-t border-gray-100"><div className="text-xs font-bold text-[#34495e] uppercase mb-1">Spiegazione</div><p className="text-sm text-[#756f63] leading-relaxed">{q.explanation}</p></div>:null}
                                    </div>
                                );
                            })}
                        </div>
                    );
                }

                function ArchiveApp(){
                    const [sel,setSel]=useState(null);
                    if(sel&&D.students[sel]) return <Dettaglio student={D.students[sel]} back={function(){setSel(null);}} />;
                    return (
                        <div>
                            <div className="bg-[#34495e] text-white"><div className="max-w-5xl mx-auto px-4 py-5"><div className="text-[11px] uppercase tracking-widest text-white/60">Arte Bianca di Neive · Archivio verifica (sola lettura)</div><div className="text-2xl font-extrabold">Classe {D.cls}</div><div className="text-xs text-white/70 mt-0.5">prof. Mauro Becattini · generato il {new Date(D.generatedAt).toLocaleString('it-IT')} · {students.length} alunni</div></div></div>
                            <div className="max-w-5xl mx-auto px-4 py-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50 text-[#756f63] text-xs uppercase"><tr><th className="px-4 py-3">PIN</th><th className="px-4 py-3">Studente</th><th className="px-4 py-3 text-center">Chiuse</th><th className="px-4 py-3 text-center">Aperte</th><th className="px-4 py-3 text-center">Totale</th><th className="px-4 py-3 text-center">%</th><th className="px-4 py-3 text-center">Voto</th><th></th></tr></thead>
                                    <tbody>
                                        {students.map(function(s){
                                            var bd=breakdown(s); var pct=bd.totalMax?Math.round(bd.percent):0; var voto=votoFromPercent(bd.percent); var hasOpen=bd.openMax>0;
                                            return (
                                                <tr key={s.pin} onClick={function(){setSel(s.pin);}} className="border-t border-gray-100 hover:bg-gray-50 cursor-pointer">
                                                    <td className="px-4 py-3 font-mono font-bold text-[#34495e]">{s.pin}</td>
                                                    <td className="px-4 py-3 font-semibold whitespace-nowrap">{s.lastName} {s.firstName}</td>
                                                    <td className="px-4 py-3 text-center font-semibold text-[#34495e]">{fmtN(bd.closedScore)+"/"+fmtN(bd.closedMax)}</td>
                                                    <td className="px-4 py-3 text-center font-semibold">{hasOpen?(fmtN(bd.openScore)+"/"+fmtN(bd.openMax)):"\u2014"}</td>
                                                    <td className="px-4 py-3 text-center font-extrabold text-[#34495e]">{fmtN(bd.total)+"/"+fmtN(bd.totalMax)}</td>
                                                    <td className={"px-4 py-3 text-center font-extrabold "+(pct>=SOGLIA?"text-[#7fb088]":"text-[#c0392b]")}>{pct+"%"}</td>
                                                    <td className="px-4 py-3 text-center font-bold">{voto}</td>
                                                    <td className="px-4 py-3 text-right text-gray-300">&rsaquo;</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table></div></div>
                                <div className="mt-4 text-xs text-[#756f63] text-center">Clicca su un alunno per vedere la verifica completa, con risposte corrette, spiegazioni e correzione delle aperte.</div>
                                <div className="text-center py-6 text-xs text-[#34495e]/70 font-semibold tracking-widest">ARTE BIANCA DI NEIVE</div>
                            </div>
                        </div>
                    );
                }
                ReactDOM.createRoot(document.getElementById('root')).render(<ArchiveApp/>);
            `;

            return [
                '<!DOCTYPE html>',
                '<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '<title>Archivio verifica ' + cls + ' \u2014 Arte Bianca di Neive</title>',
                '<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>',
                '<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>',
                '<script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>',
                '<script src="https://cdn.tailwindcss.com"><\/script>',
                '<style>@import url(\'https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap\');body{font-family:Cabin,sans-serif;background:#fcfcfc;color:#2e2e2e;}</style>',
                '</head><body><div id="root"></div>',
                '<script>window.__ARCHIVE__ = ' + dataJson + ';<\/script>',
                '<script type="text/babel">' + archScript + '<\/script>',
                '</body></html>'
            ].join('\n');
        };

        /* =====================================================================
           CORE CORE CORE DIRECTING DISPATCHER CON SYNC REALTIME CLOUD
        ===================================================================== */
        const App = () => {
            const [view, setView] = useState('landing'); 
            const [session, setSession] = useState(null);
            const [db, setDb] = useState({ version: 1, classes: {} });
            const [loading, setLoading] = useState(true);

            const pullCloudState = async () => {
                const { data, error } = await supabase.from('app_state').select('db_data, questions_data').eq('id', 1).single();
                if (!error && data) {
                    setDb({ version: 1, classes: data.db_data?.classes || {} });
                }
                setLoading(false);
            };

            useEffect(() => {
                pullCloudState();
                const intervalId = setInterval(() => {
                    pullCloudState();
                }, 3000);
                return () => clearInterval(intervalId);
            }, []);

            useEffect(() => {
                try {
                    const raw = sessionStorage.getItem(SESSION_KEY);
                    if (raw) {
                        const { pin, cls } = JSON.parse(raw);
                        setSession({ pin, cls });
                        setView('student');
                    }
                } catch (e) { }
            }, []);

            const syncUpdateCloud = async (cls, pin, updatedStudentData, fullClasses = null) => {
                let currentClasses = fullClasses ? fullClasses : { ...db.classes };

                if (cls && pin && updatedStudentData) {
                    currentClasses[cls].students[pin] = updatedStudentData;
                }

                setDb({ version: 1, classes: currentClasses });
                await supabase.from('app_state').update({ db_data: { classes: currentClasses }, questions_data: [] }).eq('id', 1);
            };

            const resetDatabaseCloud = async () => {
                setDb({ version: 1, classes: {} });
                await supabase.from('app_state').update({ db_data: { classes: {} }, questions_data: [] }).eq('id', 1);
            };

            const handleStudentLogin = (pin, callback) => {
                const found = findStudent(db.classes, pin);
                if (!found) { callback({ ok: false, msg: "PIN non censito a sistema." }); return; }
                const { cls, student } = found;

                if (student.status === 'idle') {
                    const clsQuestions = (db.classes[cls] && db.classes[cls].questions) || [];
                    const updated = { 
                        ...student, 
                        status: 'playing', 
                        startedAt: student.startedAt || Date.now(), 
                        optionOrder: (student.optionOrder && Object.keys(student.optionOrder).length > 0) ? student.optionOrder : buildOptionOrder(clsQuestions),
                        matchOrder: (student.matchOrder && Object.keys(student.matchOrder).length > 0) ? student.matchOrder : buildMatchOrder(clsQuestions),
                        questionOrder: (Array.isArray(student.questionOrder) && student.questionOrder.length) ? student.questionOrder : buildQuestionOrder(clsQuestions),
                        openGrades: student.openGrades || {}
                    };
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    syncUpdateCloud(cls, pin, updated);
                    callback({ ok: true });
                } else if (student.status === 'submitted' || student.status === 'published') {
                    // Entra senza problemi per vedere la correzione/risultati
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    callback({ ok: true });
                } else if (student.status === 'playing') {
                    // Se il docente ha appena sbloccato, concedo UN rientro per riprendere da dove era.
                    if (student.resumeAllowed) {
                        const updated = { ...student, resumeAllowed: false };
                        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                        setSession({ pin, cls }); setView('student');
                        syncUpdateCloud(cls, pin, updated);
                        callback({ ok: true });
                    } else {
                        // Blocco anti-furbetto: era in corso e sta entrando da un altro dispositivo/scheda
                        const updated = { ...student, status: 'locked' };
                        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                        setSession({ pin, cls }); setView('student');
                        syncUpdateCloud(cls, pin, updated);
                        callback({ ok: true });
                    }
                } else if (student.status === 'locked') {
                    // Già bloccato, va alla pagina di blocco
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    callback({ ok: true });
                }
            };

            if (loading) {
                return (
                    <div className="flex-grow flex items-center justify-center bg-[#fcfcfc]">
                        <div className="text-center font-bold text-[#34495e] text-lg">Connessione al Cloud Engine in corso...</div>
                    </div>
                );
            }

            if (view === 'admin') return <AdminApp db={db} onSyncUpdate={syncUpdateCloud} onResetDB={resetDatabaseCloud} onExit={() => setView('landing')} />;
            if (view === 'student' && session) return <StudentApp pin={session.pin} cls={session.cls} db={db} onSyncUpdate={syncUpdateCloud} onExit={() => { sessionStorage.removeItem(SESSION_KEY); setSession(null); setView('landing'); }} />;
            return <Landing onStudent={handleStudentLogin} onAdmin={() => setView('admin')} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
