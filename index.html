            const openQuestions = questions.filter(q => q.type === 'open');
            const [grades, setGrades] = useState(() => {
                const initial = {};
                openQuestions.forEach(q => {
                    const a = student.answers[q.id];
                    initial[q.id] = { score: a?.score != null ? parseFloat(a.score) : 0, comment: a?.comment || "" };
                });
                return initial;
            });

            const handleSave = () => {
                const updatedAnswers = { ...student.answers };
                openQuestions.forEach(q => {
                    if (!updatedAnswers[q.id]) updatedAnswers[q.id] = {};
                    updatedAnswers[q.id].score = grades[q.id].score;
                    updatedAnswers[q.id].comment = grades[q.id].comment;
                });
                onSave(student.pin, updatedAnswers);
            };

            if (openQuestions.length === 0) return <div className="p-4 text-center">Nessuna domanda aperta in questa verifica.</div>;

            return (
                <div>
                    <div className="flex items-center justify-between mb-3">
                        <h3 className="text-xl font-extrabold text-[#34495e]">Valutazione Risposte Aperte</h3>
                        <button onClick={onClose} className="text-gray-400 hover:text-[#34495e]"><Icon name="x" size={22}/></button>
                    </div>

                    <div className="space-y-6 max-h-[60vh] overflow-y-auto pr-2 pb-4">
                        {openQuestions.map((q, idx) => {
                            const currentGrade = grades[q.id];
                            return (
                                <div key={q.id} className="border border-gray-200 rounded-2xl p-5 bg-white shadow-sm">
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-widest">Domanda {idx + 1} di {openQuestions.length}</div>
                                        <div className="text-xs font-bold bg-gray-100 text-[#34495e] px-2 py-1 rounded">Max {q.points} pt</div>
                                    </div>
                                    <p className="font-bold text-[#2e2e2e] mb-2 leading-relaxed text-sm">{q.question}</p>
                                    {q.rubric && <div className="text-xs text-[#756f63] bg-[#f7dd73]/15 rounded-lg p-3 mb-4 leading-relaxed"><b>Criteri:</b> {q.rubric}</div>}

                                    <div className="bg-gray-50 rounded-xl p-4 text-sm text-[#2e2e2e] whitespace-pre-wrap leading-relaxed mb-4 border">
                                        {student.answers[q.id]?.selection || <span className="italic text-gray-400">Nessun testo presente.</span>}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <div className="text-xs font-bold text-[#34495e] uppercase mb-2">Punteggio Decimali</div>
                                            <div className="flex items-center gap-2">
                                                <input type="number" step="0.1" min="0" max={q.points} value={currentGrade.score} 
                                                    onChange={e => setGrades(prev => ({...prev, [q.id]: {...prev[q.id], score: parseFloat(e.target.value) || 0}}))}

                                        </div>

                    </div>

                    <div className="grid grid-cols-2 gap-3 mt-5 pt-4 border-t border-gray-100">

                    </div>

            );
        };

        const PrintArea = ({ cls, classData, questions, maxClosed, maxOpen, maxTotal }) => {
            const students = Object.values(classData.students)
                .filter(s => s.status === 'submitted' || s.status === 'published')

                    {students.map(s => {

                                    </div>
                                </div>

                                {closedQuestions.map((q, i) => {

        const buildArchiveHTML = (cls, classData, questions, maxClosed, maxOpen, maxTotal) => {
            const studentsDone = {};
            Object.values(classData.students).forEach(s => {

            const payload = { cls, generatedAt: new Date().toISOString(), SOGLIA: SOGLIA_SUFFICIENZA, maxClosed, maxOpen, maxTotal, questions, students: studentsDone };
            const dataJson = JSON.stringify(payload).replace(/</g, '\\u003c');

            const archScript = `
                const { useState } = React;
                const D = window.__ARCHIVE__;
                const Q = D.questions;
                const CLOSED = Q.filter(function(q){ return q.type !== 'open'; });
                const OPEN = Q.filter(function(q){ return q.type === 'open'; });
                
                const calcPts = function(q, ans){
                    if (!ans || ans.selection === undefined) return 0;
                    const sel = ans.selection;
                    if (q.type === 'single') return sel === q.correctIndex ? q.points : 0;
                    if (q.type === 'multi') {
                        if (!Array.isArray(sel)) return 0;
                        const correctCount = sel.filter(function(i){ return q.correctIndices.includes(i); }).length;
                        const wrongCount = sel.length - correctCount;
                        if (wrongCount === 0 && correctCount === 2) return 1.3;
                        if (wrongCount === 0 && correctCount === 1) return 0.5;
                        return 0;
                    }
                    if (q.type === 'matching') {
                        if (typeof sel !== 'object') return 0;
                        let correctPairs = 0;
                        Object.keys(sel).forEach(function(k){ if (sel[k] === q.solutionMap[k]) correctPairs++; });
                        if (correctPairs === 4) return 1.3;
                        if (correctPairs >= 2) return 0.5;
                        return 0;
                    }
                    return 0;
                };

                const calcClosed = function(s){ let t=0; CLOSED.forEach(function(q){ t+=calcPts(q, s.answers[q.id]); }); return t; };
                const calcOpen = function(s){ let t=0; OPEN.forEach(function(q){ const a=s.answers[q.id]; if(a && a.score!=null) t+=parseFloat(a.score); }); return t; };
                const students = Object.keys(D.students).map(function(k){ return D.students[k]; }).sort(function(a,b){ return (a.lastName+a.firstName).localeCompare(b.lastName+b.firstName); });

                function Dettaglio(props){
                    var s = props.student;
                    var closed = s.closedScore!=null ? s.closedScore : calcClosed(s);
                    var open = calcOpen(s);
                    var tot = closed + open;
                    var pct = D.maxTotal ? Math.round(tot/D.maxTotal*100) : 0;
                    var voto = D.maxTotal ? (tot/D.maxTotal*10) : 0;
                    var passed = pct >= D.SOGLIA;
                    return (
                        <div className="max-w-3xl mx-auto px-4 py-6">
                            <button onClick={props.back} className="mb-4 text-sm font-bold text-[#34495e] flex items-center gap-1">&larr; Torna all'elenco</button>

                                        <div className="text-xs font-bold text-gray-400 uppercase tracking-widest">Classe {D.cls} · PIN {s.pin}</div>

                                    </div>
                                    <div className="text-right">
                                        <div className={"text-4xl font-extrabold " + (passed?"text-[#7fb088]":"text-[#c0392b]")}>{voto.toFixed(1)}<span className="text-base text-[#756f63]">/10</span></div>
                                        <div className="text-xs font-semibold text-[#756f63] mt-1">{tot.toFixed(1)}/{D.maxTotal} · {pct}%</div>
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-3 text-xs font-semibold">
                                    <span className="bg-gray-100 rounded-lg px-3 py-1.5 text-[#34495e]">Chiuse {closed.toFixed(1)}/{D.maxClosed}</span>
                                    <span className="bg-gray-100 rounded-lg px-3 py-1.5 text-[#34495e]">Aperte {open.toFixed(1)}/{D.maxOpen}</span>
                                </div>
                            </div>
                            
                            {CLOSED.map(function(q,i){
                                var a = s.answers[q.id];
                                var pts = calcPts(q, a);
                                var answered = false;
                                if(a){
                                    if(q.type === 'multi') answered = Array.isArray(a.selection) && a.selection.length>0;
                                    else if(q.type === 'matching') answered = typeof a.selection === 'object' && Object.keys(a.selection).length>0;
                                    else answered = a.selection !== undefined;
                                }

                                var ok = Math.abs(pts - q.points) < 0.01;
                                var parz = !ok && pts > 0;
                                
                                var badgeClass = "bg-gray-200 text-gray-600";
                                var badgeText = "NON RISPOSTA";
                                var border = "border-gray-300";
                                if (answered) {
                                    if(ok){ badgeClass="bg-[#7fb088]/10 text-[#7fb088]"; badgeText="CORRETTA"; border="border-[#7fb088]"; }
                                    else if(parz){ badgeClass="bg-[#f7dd73]/30 text-[#7a6310]"; badgeText="PARZIALE"; border="border-[#f7dd73]"; }
                                    else { badgeClass="bg-[#c0392b]/10 text-[#c0392b]"; badgeText="ERRATA"; border="border-[#c0392b]"; }
                                }

                                return (
                                    <div key={q.id} className={"bg-white p-5 rounded-2xl shadow-sm border-l-8 mb-4 " + border}>
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Domanda {i+1} <span className="lowercase text-gray-400 ml-1">({q.type})</span></span>
                                            <span className={"text-xs font-bold px-2 py-1 rounded " + badgeClass}>{badgeText}</span>
                                        </div>
                                        <p className="font-bold text-[#2e2e2e] mb-3 leading-relaxed">{q.question}</p>
                                        
                                        {q.type === 'single' || q.type === 'multi' ? (
                                            <div className="space-y-2">
                                                {q.options.map(function(opt,idx){
                                                    var isSel = false; var isCor = false;
                                                    if(q.type === 'single'){ isSel = a && a.selection===idx; isCor = idx===q.correctIndex; }
                                                    if(q.type === 'multi'){ isSel = a && Array.isArray(a.selection) && a.selection.includes(idx); isCor = q.correctIndices.includes(idx); }
                                                    var stl = "bg-gray-50 text-gray-400 border-transparent";
                                                    if(isCor) stl = "bg-[#7fb088] text-white border-[#7fb088]";
                                                    else if(isSel) stl = "bg-[#c0392b] text-white border-[#c0392b]";
                                                    return <div key={idx} className={"p-3 rounded-xl text-sm font-medium border flex items-center justify-between " + stl}><span>{opt}</span><span className="text-xs font-extrabold">{isCor?"\u2713":(isSel?"\u2717":"")}</span></div>;
                                                })}
                                            </div>
                                        ) : null}

                                        {q.type === 'matching' ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <div className="text-xs font-bold mb-1">Risposte Studente:</div>
                                                    {a && a.selection && Object.keys(a.selection).length > 0 ? Object.entries(a.selection).map(function(pair, k){
                                                        var cor = q.solutionMap[pair[0]] === pair[1];
                                                        return <div key={k} className="text-sm p-2 bg-gray-50 border rounded mb-1"><span className="font-semibold">{pair[0]}</span> &rarr; <span className={cor?"text-[#7fb088] font-bold":"text-[#c0392b] font-bold"}>{pair[1]}</span></div>;
                                                    }) : <div className="text-sm text-gray-400 italic">Nessun abbinamento</div>}
                                                </div>
                                                <div>
                                                    <div className="text-xs font-bold mb-1">Soluzione Corretta:</div>
                                                    {Object.entries(q.solutionMap).map(function(pair, k){
                                                        return <div key={k} className="text-sm p-2 bg-[#eaf5e9] border border-[#7fb088] rounded mb-1"><span className="font-semibold">{pair[0]}</span> &rarr; <span className="text-[#34495e]">{pair[1]}</span></div>;
                                                    })}
                                                </div>
                                            </div>
                                        ) : null}

                                        {q.explanation ? <div className="mt-4 pt-3 border-t border-gray-100"><div className="text-xs font-bold text-[#34495e] uppercase mb-1">Spiegazione</div><p className="text-sm text-[#756f63] leading-relaxed">{q.explanation}</p></div> : null}
                                    </div>
                                );
                            })}
                            
                            {OPEN.map(function(q, i){
                                var a = s.answers[q.id];
                                return (
                                    <div key={q.id} className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-[#34495e] mb-4">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Domanda Aperta {i+1}</span>
                                            <span className="text-xs font-bold px-2 py-1 rounded bg-gray-100 text-[#34495e]">{a?.score || 0}/{q.points} pt</span>
                                        </div>
                                        <p className="font-bold text-[#2e2e2e] mb-3 leading-relaxed">{q.question}</p>
                                        <div className="text-xs font-bold text-[#34495e] uppercase mb-1">Risposta dell'alunno</div>
                                        <div className="bg-gray-50 rounded-xl p-4 text-sm whitespace-pre-wrap leading-relaxed text-[#2e2e2e]">{a?.selection || <span className="italic text-gray-400">Nessuna risposta fornita.</span>}</div>
                                        {a?.comment ? <div className="bg-[#aed6f1]/20 rounded-xl p-4 text-sm mt-3"><div className="text-xs font-bold text-[#34495e] uppercase mb-1">Commento del docente</div><div className="text-[#2e2e2e] leading-relaxed">{a.comment}</div></div> : null}
                                    </div>
                                )
                            })}
                        </div>
                    );
                }

                function ArchiveApp(){
                    const [sel, setSel] = useState(null);
                    if (sel && D.students[sel]) return <Dettaglio student={D.students[sel]} back={function(){ setSel(null); }} />;
                    return (
                        <div>
                            <div className="bg-[#34495e] text-white">
                                <div className="max-w-5xl mx-auto px-4 py-5">
                                    <div className="text-[11px] uppercase tracking-widest text-white/60">Arte Bianca di Neive · Archivio verifica (sola lettura)</div>
                                    <div className="text-2xl font-extrabold">Classe {D.cls}</div>
                                    <div className="text-xs text-white/70 mt-0.5">prof. Mauro Becattini · generato il {new Date(D.generatedAt).toLocaleString('it-IT')} · {students.length} alunni</div>
                                </div>
                            </div>
                            <div className="max-w-5xl mx-auto px-4 py-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-gray-50 text-[#756f63] text-xs uppercase">
                                                <tr><th className="px-4 py-3">PIN</th><th className="px-4 py-3">Studente</th><th className="px-4 py-3 text-center">Chiuse</th><th className="px-4 py-3 text-center">Aperte</th><th className="px-4 py-3 text-center">Totale</th><th className="px-4 py-3 text-center">%</th><th className="px-4 py-3 text-center">Voto</th><th></th></tr>
                                            </thead>
                                            <tbody>
                                                {students.map(function(s){
                                                    var closed = s.closedScore!=null?s.closedScore:calcClosed(s);
                                                    var open = calcOpen(s);
                                                    var tot = closed+open;
                                                    var pct = D.maxTotal?Math.round(tot/D.maxTotal*100):0;
                                                    var voto = D.maxTotal?(tot/D.maxTotal*10):0;
                                                    return (
                                                        <tr key={s.pin} onClick={function(){ setSel(s.pin); }} className="border-t border-gray-100 hover:bg-gray-50 cursor-pointer">
                                                            <td className="px-4 py-3 font-mono font-bold text-[#34495e]">{s.pin}</td>
                                                            <td className="px-4 py-3 font-semibold whitespace-nowrap">{s.lastName} {s.firstName}</td>
                                                            <td className="px-4 py-3 text-center font-semibold text-[#34495e]">{closed.toFixed(1) + "/" + D.maxClosed}</td>
                                                            <td className="px-4 py-3 text-center font-semibold">{open.toFixed(1) + "/" + D.maxOpen}</td>
                                                            <td className="px-4 py-3 text-center font-extrabold text-[#34495e]">{tot.toFixed(1) + "/" + D.maxTotal}</td>
                                                            <td className={"px-4 py-3 text-center font-extrabold " + (pct>=D.SOGLIA?"text-[#7fb088]":"text-[#c0392b]")}>{pct + "%"}</td>
                                                            <td className="px-4 py-3 text-center font-bold">{voto.toFixed(1)}</td>
                                                            <td className="px-4 py-3 text-right text-gray-300">&rsaquo;</td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="mt-4 text-xs text-[#756f63] text-center">Clicca su un alunno per vedere la verifica completa.</div>
                                <div className="text-center py-6 text-xs text-[#34495e]/70 font-semibold tracking-widest">ARTE BIANCA DI NEIVE</div>
                            </div>
                        </div>
                    );
                }
                ReactDOM.createRoot(document.getElementById('root')).render(<ArchiveApp/>);
            `;

            return [
                '<!DOCTYPE html>',
                '<html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '<title>Archivio verifica ' + cls + ' \u2014 Arte Bianca di Neive</title>',
                '<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin><\/script>',
                '<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin><\/script>',
                '<script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>',
                '<script src="https://cdn.tailwindcss.com"><\/script>',
                '<style>@import url(\'https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap\');body{font-family:Cabin,sans-serif;background:#fcfcfc;color:#2e2e2e;}</style>',
                '</head><body><div id="root"></div>',
                '<script>window.__ARCHIVE__ = ' + dataJson + ';<\/script>',
                '<script type="text/babel">' + archScript + '<\/script>',
                '</body></html>'
            ].join('\n');
        };

        /* =====================================================================
           CORE DIRECTING DISPATCHER CON SYNC REALTIME CLOUD
        ===================================================================== */
        const App = () => {
            const [view, setView] = useState('landing'); 
            const [session, setSession] = useState(null);
            const [db, setDb] = useState({ version: 1, classes: {}, questions: [] });
            const [loading, setLoading] = useState(true);

            const pullCloudState = async () => {
                const { data, error } = await supabase.from('app_state').select('db_data, questions_data').eq('id', 1).single();
                if (!error && data) {
                    setDb({ version: 1, classes: data.db_data?.classes || {}, questions: data.questions_data || [] });
                }
                setLoading(false);
            };

            useEffect(() => {
                pullCloudState();
                const intervalId = setInterval(() => {
                    pullCloudState();
                }, 3000);
                return () => clearInterval(intervalId);
            }, []);

            useEffect(() => {
                try {
                    const raw = sessionStorage.getItem(SESSION_KEY);
                    if (raw) {
                        const { pin, cls } = JSON.parse(raw);
                        setSession({ pin, cls });
                        setView('student');
                    }
                } catch (e) { }
            }, []);

            const syncUpdateCloud = async (cls, pin, updatedStudentData, fullClasses = null, fullQuestions = null) => {
                let currentClasses = fullClasses ? fullClasses : { ...db.classes };
                let currentQuestions = fullQuestions ? fullQuestions : [ ...db.questions ];
                
                if (cls && pin && updatedStudentData) {
                    currentClasses[cls].students[pin] = updatedStudentData;
                }

                setDb({ version: 1, classes: currentClasses, questions: currentQuestions });
                await supabase.from('app_state').update({ db_data: { classes: currentClasses }, questions_data: currentQuestions }).eq('id', 1);
            };

            const resetDatabaseCloud = async () => {
                setDb({ version: 1, classes: {}, questions: [] });
                await supabase.from('app_state').update({ db_data: { classes: {} }, questions_data: [] }).eq('id', 1);
            };

            const handleStudentLogin = (pin, callback) => {
                const found = findStudent(db.classes, pin);
                if (!found) { callback({ ok: false, msg: "PIN non censito a sistema." }); return; }
                const { cls, student } = found;

                if (student.status === 'idle') {
                    const updated = { 
                        ...student, 
                        status: 'playing', 
                        startedAt: student.startedAt || Date.now(), 
                        optionOrder: (student.optionOrder && Object.keys(student.optionOrder).length > 0) ? student.optionOrder : buildOptionOrder(db.questions) 
                    };
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    syncUpdateCloud(cls, pin, updated);
                    callback({ ok: true });
                } else if (student.status === 'submitted' || student.status === 'published') {
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    callback({ ok: true });
                } else if (student.status === 'playing') {
                    if (student.resumeAllowed) {
                        const updated = { ...student, resumeAllowed: false };
                        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                        setSession({ pin, cls }); setView('student');
                        syncUpdateCloud(cls, pin, updated);
                        callback({ ok: true });
                    } else {
                        const updated = { ...student, status: 'locked' };
                        sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                        setSession({ pin, cls }); setView('student');
                        syncUpdateCloud(cls, pin, updated);
                        callback({ ok: true });
                    }
                } else if (student.status === 'locked') {
                    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ pin, cls }));
                    setSession({ pin, cls }); setView('student');
                    callback({ ok: true });
                }
            };

            const maxClosed = db.questions ? db.questions.filter(q => q.type !== 'open').reduce((a, q) => a + q.points, 0) : 0;
            const maxOpen = db.questions ? db.questions.filter(q => q.type === 'open').reduce((a, q) => a + q.points, 0) : 0;
            const maxTotal = maxClosed + maxOpen;

            if (loading) {
                return (
                    <div className="flex-grow flex items-center justify-center bg-[#fcfcfc]">
                        <div className="text-center font-bold text-[#34495e] text-lg">Connessione al Cloud Engine in corso...</div>
                    </div>
                );
            }

            if (view === 'admin') return <AdminApp db={db} maxClosed={maxClosed} maxOpen={maxOpen} maxTotal={maxTotal} onSyncUpdate={syncUpdateCloud} onResetDB={resetDatabaseCloud} onExit={() => setView('landing')} />;
            if (view === 'student' && session) return <StudentApp pin={session.pin} cls={session.cls} db={db} maxClosed={maxClosed} maxOpen={maxOpen} maxTotal={maxTotal} onSyncUpdate={syncUpdateCloud} onExit={() => { sessionStorage.removeItem(SESSION_KEY); setSession(null); setView('landing'); }} />;
            return <Landing onStudent={handleStudentLogin} onAdmin={() => setView('admin')} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
